<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分潤計算機</title>
<link rel="icon" type="image/png" href="linda-logo.png">
<script src="xlsx.full.min.js" onerror="(function(s){s.remove();var n=document.createElement('script');n.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';n.onload=function(){window.onXLSXReady&&window.onXLSXReady()};document.head.appendChild(n)})(this)"></script>
<style>
  :root{
    --brand:#048bba;--brand-d:#036a8f;--brand-dd:#024d68;
    --brand-l:#E3F2F8;--brand-ll:#F2F9FC;
    --accent:#603f3a;--accent-d:#4a2f2b;--accent-l:#F1E8E6;
    --bg:#F5F8FB;--card:#FFFFFF;--ink:#1F2528;--text:#3C474E;--muted:#74808A;
    --line:#E4EBF1;--warn:#C67E13;--danger:#c0392b;
    --shadow:0 6px 24px rgba(4,139,186,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased;padding-bottom:60px}

  header{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-d) 60%,var(--brand-dd) 100%);
    color:#fff;text-align:center;padding:42px 18px 36px;position:relative;overflow:hidden}
  header .badge{display:inline-block;font-size:13px;letter-spacing:2px;
    background:rgba(255,255,255,.15);padding:5px 16px;border-radius:30px;margin-bottom:14px}
  header h1{font-size:30px;font-weight:800;letter-spacing:1px}
  header p{margin-top:10px;font-size:15px;color:#d6ecf5;font-weight:400}
  header .header-logo{display:block;margin:0 auto 14px;max-height:64px;width:auto;max-width:220px}
  header .subtitle{margin-top:12px;font-size:14.5px;color:#d6ecf5;font-weight:400;letter-spacing:.5px;line-height:1.7}

  .wrap{max-width:980px;margin:24px auto 0;padding:0 18px}
  .content{min-width:0}

  .card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);
    padding:26px 24px;margin-bottom:22px;border:1px solid var(--line)}

  .add-payee{display:flex;gap:10px;align-items:center;padding:14px 16px;
    background:var(--brand-l);border:1.5px dashed var(--brand);border-radius:14px;
    margin-bottom:18px;flex-wrap:wrap}
  .add-payee label{font-weight:700;color:var(--brand-d);font-size:14px;white-space:nowrap}
  .payee-input-wrap{position:relative;flex:1 1 200px;min-width:160px}
  .add-payee input{width:100%;padding:9px 34px 9px 12px;border:1.5px solid var(--line);
    border-radius:9px;font-size:14.5px;font-family:inherit;background:#fff}
  .add-payee input:focus{outline:none;border-color:var(--brand);background:#fff}
  .payee-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;padding:6px 9px;border-radius:6px;
    color:var(--brand);font-size:10px;font-family:inherit;line-height:1;transition:.18s}
  .payee-toggle:hover{background:var(--brand-l);color:var(--brand-d)}
  .payee-input-wrap.open .payee-toggle{transform:translateY(-50%) rotate(180deg)}
  .payee-suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;
    border:1.5px solid var(--brand);border-radius:9px;max-height:260px;overflow-y:auto;
    z-index:50;display:none;box-shadow:0 6px 16px rgba(0,0,0,.12)}
  .payee-suggestions.show{display:block}
  .payee-suggestion-item{padding:10px 14px;cursor:pointer;font-size:14px;color:var(--text);
    border-bottom:1px solid var(--line);transition:.12s;line-height:1.4;
    display:flex;justify-content:space-between;align-items:center;gap:10px}
  .payee-suggestion-item:last-child{border-bottom:none}
  .payee-suggestion-item:hover,.payee-suggestion-item.active{
    background:var(--brand-l);color:var(--brand-d);font-weight:700}
  .payee-suggestion-item .existing-tag{font-size:11px;font-weight:600;
    background:var(--accent-l);color:var(--accent);padding:2px 8px;border-radius:20px;white-space:nowrap}
  .payee-suggestion-item .new-tag{font-size:11px;font-weight:600;
    background:var(--brand-l);color:var(--brand-d);padding:2px 8px;border-radius:20px;white-space:nowrap}
  .payee-suggestion-item:hover .existing-tag,.payee-suggestion-item.active .existing-tag{
    background:#fff;color:var(--accent)}
  .payee-suggestion-item:hover .new-tag,.payee-suggestion-item.active .new-tag{
    background:#fff;color:var(--brand-d)}
  .payee-suggestion-item .sugg-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .payee-suggestion-item .sugg-del{background:none;border:none;cursor:pointer;
    color:var(--muted);width:24px;height:24px;border-radius:50%;font-size:12px;
    display:flex;align-items:center;justify-content:center;transition:.15s;font-family:inherit}
  .payee-suggestion-item .sugg-del:hover{background:#fde8e6;color:var(--danger)}
  .payee-card.highlight{animation:cardPulse 1.4s ease-out}
  @keyframes cardPulse{
    0%{box-shadow:0 0 0 4px var(--brand),0 6px 18px rgba(4,139,186,.35)}
    100%{box-shadow:0 2px 8px rgba(0,0,0,.04)}
  }

  .btn{background:none;border:1.5px solid var(--line);color:var(--muted);
    border-radius:9px;padding:9px 16px;cursor:pointer;font-size:13.5px;
    transition:.15s;font-family:inherit;font-weight:600;white-space:nowrap}
  .btn:hover{border-color:var(--brand);color:var(--brand-d)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-d);border-color:var(--brand-d);color:#fff}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.accent:hover{background:var(--accent-d);border-color:var(--accent-d);color:#fff}
  .btn.danger-outline:hover{border-color:var(--danger);color:var(--danger)}
  .btn.sm{padding:6px 12px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .empty-hint{padding:40px 20px;text-align:center;color:var(--muted);
    background:var(--brand-ll);border-radius:14px;border:1px dashed var(--line)}
  .empty-hint .ic{font-size:32px;margin-bottom:6px;opacity:.5}
  .empty-hint .t{font-size:15px;font-weight:600;color:var(--text)}
  .empty-hint .s{font-size:13px;margin-top:4px}

  .payee-card{background:#fff;border:1px solid var(--line);border-radius:14px;
    margin-bottom:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .payee-card-head{display:flex;align-items:center;gap:12px;padding:14px 18px;
    background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;flex-wrap:wrap}
  .payee-card-head .ic{flex-shrink:0;display:block}
  .payee-name-input{flex:1 1 180px;min-width:140px;padding:7px 12px;
    background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
    border-radius:8px;color:#fff;font-size:15.5px;font-weight:700;font-family:inherit}
  .payee-name-input::placeholder{color:rgba(255,255,255,.6);font-weight:500}
  .payee-name-input:focus{outline:none;background:rgba(255,255,255,.25);border-color:#fff}
  .payee-card-subtotal{font-weight:800;font-size:18px;white-space:nowrap;
    padding:6px 14px;background:rgba(255,255,255,.18);border-radius:20px}
  .payee-card-subtotal .lbl{font-size:12px;font-weight:500;opacity:.85;margin-right:6px}
  .payee-del{background:rgba(255,255,255,.15);border:none;color:#fff;
    width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;transition:.15s;
    display:flex;align-items:center;justify-content:center}
  .payee-del:hover{background:rgba(255,255,255,.3)}

  .payee-card-body{padding:14px 18px 18px}
  .rows-wrap{overflow-x:auto}
  table.rows{width:100%;border-collapse:collapse;font-size:14px;min-width:720px}
  table.rows thead th{background:var(--brand);color:#fff;font-weight:600;
    padding:10px 8px;text-align:center;font-size:13px;white-space:nowrap}
  table.rows thead th:first-child{border-radius:8px 0 0 0;text-align:left;padding-left:12px}
  table.rows thead th:last-child{border-radius:0 8px 0 0}
  table.rows tbody td{padding:8px 6px;border-bottom:1px solid var(--line);
    text-align:center;vertical-align:middle}
  table.rows tbody tr:last-child td{border-bottom:none}
  table.rows tbody tr:hover{background:var(--brand-ll)}
  table.rows input,table.rows select{width:100%;padding:7px 8px;border:1.5px solid var(--line);
    border-radius:8px;font-size:14px;color:var(--ink);background:#fff;
    font-family:inherit;transition:.15s}
  table.rows input[type=number]{text-align:center;font-weight:600;-moz-appearance:textfield}
  table.rows input[type=number]::-webkit-outer-spin-button,
  table.rows input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  table.rows input:focus,table.rows select:focus{outline:none;
    border-color:var(--brand);background:var(--brand-l)}
  .unit-cell{font-weight:700;color:var(--brand-d);white-space:nowrap;min-width:90px}
  .sub-cell{font-weight:800;color:var(--ink);white-space:nowrap;min-width:90px}
  .row-del{background:none;border:none;color:var(--muted);font-size:16px;
    cursor:pointer;padding:4px 8px;border-radius:6px;transition:.15s;line-height:1}
  .row-del:hover:not(:disabled){background:#fde8e6;color:var(--danger)}
  .row-del:disabled{opacity:.25;cursor:not-allowed}
  .col-role{min-width:90px}.col-plan{min-width:200px}
  .col-type{min-width:90px}.col-qty{width:80px}

  .add-row-btn{margin-top:10px;width:100%;padding:9px;background:var(--brand-ll);
    border:1.5px dashed var(--brand);color:var(--brand-d);border-radius:9px;
    cursor:pointer;font-size:13.5px;font-weight:600;font-family:inherit;transition:.15s}
  .add-row-btn:hover{background:var(--brand-l)}

  .unit-cell.warn{color:var(--warn);font-size:12.5px;font-weight:700;cursor:help}
  table.rows tbody tr.row-warn{background:#FFF8EE}
  table.rows tbody tr.row-warn:hover{background:#FFF1D6}
  .plan-warning{display:block;font-size:11.5px;color:var(--warn);font-weight:700;
    margin-top:5px;line-height:1.3;text-align:left;padding:3px 6px;background:#FFF1D6;
    border-radius:5px;border-left:3px solid var(--warn)}

  .grand-bar{background:linear-gradient(135deg,var(--brand-l),var(--brand-ll));
    border:2px solid var(--brand);border-radius:14px;padding:16px 20px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-top:8px}
  .grand-bar .lbl{font-weight:700;color:var(--ink);font-size:15px}
  .grand-bar .lbl small{color:var(--muted);font-weight:500;margin-left:8px;font-size:13px}
  .grand-bar .amt{font-size:26px;font-weight:800;color:var(--brand-d)}

  .export-bar{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .export-bar .hint{flex:1;min-width:200px;font-size:12.5px;color:var(--muted);
    align-self:center;line-height:1.5}

  .note{font-size:12.5px;color:var(--muted);background:#FFF8EE;border-left:3px solid var(--warn);
    padding:10px 14px;border-radius:0 8px 8px 0;margin-top:14px}
  footer{text-align:center;color:var(--muted);font-size:12.5px;margin-top:30px;padding:0 18px}
  footer a{color:var(--accent);font-weight:600;text-decoration:none}
  footer a:hover{text-decoration:underline}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:.25s;pointer-events:none;z-index:1000}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.warn{background:var(--warn)}

  @media(max-width:560px){
    header h1{font-size:24px}
    .card{padding:20px 16px}
    .grand-bar .amt{font-size:22px}
    .payee-card-head{padding:12px 14px}
    .payee-card-body{padding:12px 12px 14px}
  }
</style>
</head>
<body>

<header>
  <img src="linda-logo-white.png" alt="Linda Logo" class="header-logo">
  <div class="badge">分潤計算機</div>
  <div class="subtitle">輸入引薦人，填入推廣明細，立即算出該分給誰多少錢</div>
</header>

<div class="wrap">
  <main class="content">
    <div class="card">
      <div class="add-payee">
        <label for="newPayeeInput">新增引薦人</label>
        <div class="payee-input-wrap" id="payeeInputWrap">
          <input type="text" id="newPayeeInput" autocomplete="off" placeholder="輸入姓名後按 Enter 或點右側按鈕">
          <button type="button" class="payee-toggle" id="payeeToggle" aria-label="展開或收合下拉名單">▼</button>
          <div class="payee-suggestions" id="payeeSuggestions"></div>
        </div>
        <button class="btn primary" onclick="addPayeeFromInput()">新增</button>
      </div>

      <div id="payeesArea"></div>

      <div id="bottomArea" style="display:none">
        <div class="grand-bar">
          <span class="lbl">合計 <small><span id="payeeCount">0</span> 位引薦人 / <span id="totalQty">0</span> 筆</small></span>
          <span class="amt" id="grandTotal">$0</span>
        </div>
        <div class="export-bar">
          <button class="btn accent" id="btnExportSingle" onclick="exportXLSX('single')">📊 匯出 XLSX（單一工作表）</button>
          <button class="btn accent" id="btnExportSplit" onclick="exportXLSX('split')">📑 匯出 XLSX（每人一張工作表）</button>
          <span class="hint">分頁版本：每位引薦人獨立工作表，方便單獨傳給對方</span>
        </div>
      </div>

      <div class="note">
        ⚠ 提示：推廣期方案有適用期限，超過期限後試算列會顯示警示；請改選該班別的常態方案。
        若實際合約條件與此處不同，請以官方公告為準。
      </div>
    </div>

    <footer>
      此工具版權屬於「<a href="https://www.instagram.com/linda_hsyh" target="_blank" rel="noopener">Linda洋溢人生潛意識信念專家</a>」所有<br>
      本計算機僅供推廣分潤試算，金額以正式合約／官方公告為準。
    </footer>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== 分潤資料 ===== */
const SET_A = [
  {role:'一般', type:'flow', amount:3000},
  {role:'學員', type:'flow', amount:5000},
  {role:'學員', type:'deal', amount:10000},
  {role:'導師', type:'flow', amount:10000},
  {role:'導師', type:'deal', amount:15000},
];
const SET_B = [
  {role:'一般', type:'flow', amount:5000},
  {role:'學員', type:'flow', amount:8000},
  {role:'學員', type:'deal', amount:15000},
  {role:'導師', type:'flow', amount:15000},
  {role:'導師', type:'deal', amount:35000},
];
const SET_MULTI_OFFICIAL = [
  {role:'一般', type:'flow', amount:4500},
  {role:'學員', type:'flow', amount:7500},
  {role:'學員', type:'deal', amount:15000},
  {role:'導師', type:'flow', amount:15000},
  {role:'導師', type:'deal', amount:22500},
];
const SET_MENTOR_OFFICIAL = [
  {role:'一般', type:'flow', amount:6000},
  {role:'學員', type:'flow', amount:10000},
  {role:'學員', type:'deal', amount:20000},
  {role:'導師', type:'flow', amount:20000},
  {role:'導師', type:'deal', amount:30000},
];
const DATA = {
  multi:{
    name:'學員班 · 一對多',
    plans:[
      {name:'正式價格', price:150000, flag:'has', flagText:'有分潤', meta:'標準定價', commission:SET_MULTI_OFFICIAL, commissionNote:'成交諮詢若需 Linda 出席，扣 5%'},
      {name:'推廣期價', price:100000, flag:'promo', flagText:'至 2026/6', meta:'推廣期',
        commission:SET_A, validity:{until:new Date(2026,6,1), untilLabel:'2026/6'}},
      {name:'常態價', price:110000, flag:'has', flagText:'有分潤', meta:'2026/7 起',
        commission:SET_A, validity:{from:new Date(2026,6,1), fromLabel:'2026/7'}},
    ]
  },
  solo:{
    name:'學員班 · 一對一',
    plans:[
      {name:'正式價格', price:300000, flag:'has', flagText:'有分潤', meta:'標準定價', commission:SET_B},
      {name:'推廣期價', price:200000, flag:'promo', flagText:'至 2026/12', meta:'推廣期',
        commission:SET_A, validity:{until:new Date(2027,0,1), untilLabel:'2026/12'}},
    ]
  },
  mentor:{
    name:'導師班 · 一對多',
    plans:[
      {name:'正式價格', price:200000, flag:'has', flagText:'有分潤', meta:'不含學員班', commission:SET_MENTOR_OFFICIAL, commissionNote:'成交諮詢若需 Linda 出席，扣 5%'},
      {name:'推廣加收', price:70000, flag:'promo', flagText:'至 2025/9', meta:'學員班＋7萬',
        commission:SET_A, validity:{until:new Date(2025,9,1), untilLabel:'2025/9'}},
      {name:'常態加收', price:100000, flag:'has', flagText:'有分潤', meta:'2025/10 起｜學員班＋10萬',
        commission:SET_A, validity:{from:new Date(2025,9,1), fromLabel:'2025/10'}},
    ]
  }
};

const PLAN_OPTIONS = [];
Object.entries(DATA).forEach(([k,c])=>{
  c.plans.forEach((p,i)=>{
    if(p.commission){
      PLAN_OPTIONS.push({key:k+':'+i, label:c.name+' · '+p.name, commission:p.commission, validity:p.validity||null});
    }
  });
});
const PLAN_MAP = Object.fromEntries(PLAN_OPTIONS.map(o=>[o.key,o]));

const ROLES = ['一般','學員','導師'];
const TYPES = [{v:'flow',l:'引流'},{v:'deal',l:'成交'}];
const TYPE_LABEL = {flow:'引流', deal:'成交'};

/* ===== 工具 ===== */
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function lookupAmount(planKey, role, type){
  const p = PLAN_MAP[planKey];
  if(!p||!role||!type)return null;
  const hit = p.commission.find(c=>c.role===role&&c.type===type);
  return hit ? hit.amount : null;
}
function planValidity(planKey){
  const p = PLAN_MAP[planKey];
  if(!p || !p.validity)return null;
  const now = new Date();
  const v = p.validity;
  if(v.until && now >= v.until) return {status:'expired', text:v.untilLabel};
  if(v.from && now < v.from) return {status:'pending', text:v.fromLabel};
  return null;
}
function showToast(msg, type){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>el.className = 'toast', 2400);
}

/* ===== localStorage ===== */
const LS_REF = 'lp-referrers';
const LS_PAYEES = 'lp-payees';
function getReferrers(){
  try{return JSON.parse(localStorage.getItem(LS_REF)||'[]')}catch(e){return []}
}
function addReferrer(name){
  name = (name||'').trim();
  if(!name)return;
  const arr = getReferrers();
  if(!arr.includes(name)){
    arr.push(name);
    localStorage.setItem(LS_REF, JSON.stringify(arr));
  }
}
function savePayees(){
  try{localStorage.setItem(LS_PAYEES, JSON.stringify(payees))}catch(e){}
}
function loadPayees(){
  try{
    const r = JSON.parse(localStorage.getItem(LS_PAYEES)||'[]');
    if(Array.isArray(r))return r;
  }catch(e){}
  return [];
}

/* ===== 狀態 ===== */
let seqP = 1, seqR = 1;
let payees = loadPayees();
if(payees.length){
  seqP = Math.max(...payees.map(p=>p.id||0),0)+1;
  seqR = Math.max(...payees.flatMap(p=>p.rows.map(r=>r.id||0)),0)+1;
}
function newRow(){return {id:seqR++, role:'', planKey:'', type:'', qty:0}}

/* ===== 新增 / 刪除引薦人 ===== */
function addPayeeFromInput(){
  const inp = document.getElementById('newPayeeInput');
  const name = (inp.value||'').trim();
  if(!name){inp.focus();return}
  const existed = payees.find(p=>p.name===name);
  if(existed){
    inp.value = '';
    showToast('「'+name+'」已存在，已捲動至該卡片');
    scrollToPayee(existed.id);
    return;
  }
  payees.push({id:seqP++, name:name, rows:[newRow()]});
  addReferrer(name);
  savePayees();
  renderPayees();
  inp.value = '';
  setTimeout(()=>{
    const cards = document.querySelectorAll('.payee-card');
    if(cards.length){
      const last = cards[cards.length-1];
      last.scrollIntoView({behavior:'smooth', block:'center'});
      last.classList.add('highlight');
      setTimeout(()=>last.classList.remove('highlight'), 1500);
    }
  }, 50);
}
function delPayee(id){
  const p = payees.find(x=>x.id===id);
  if(!p)return;
  if(!confirm('確定要刪除引薦人「'+p.name+'」與其所有分潤明細嗎？'))return;
  payees = payees.filter(x=>x.id!==id);
  savePayees();
  renderPayees();
}
function onPayeeNameInput(id, value){
  const p = payees.find(x=>x.id===id);
  if(!p)return;
  p.name = value;
  savePayees();
  updateGrandBar();
}
function onPayeeNameBlur(id, value){
  const p = payees.find(x=>x.id===id);
  if(!p)return;
  const trimmed = (value||'').trim();
  if(trimmed && payees.some(x=>x.id!==id && x.name===trimmed)){
    showToast('已有同名引薦人，請使用不同名稱', 'warn');
    return;
  }
  p.name = trimmed;
  savePayees();
  if(trimmed)addReferrer(trimmed);
}

/* ===== 新增 / 刪除分潤列 ===== */
function addRow(payeeId){
  const p = payees.find(x=>x.id===payeeId);
  if(!p)return;
  p.rows.push(newRow());
  savePayees();
  renderPayeeRows(p);
}
function delRow(payeeId, rowId){
  const p = payees.find(x=>x.id===payeeId);
  if(!p||p.rows.length<=1)return;
  p.rows = p.rows.filter(r=>r.id!==rowId);
  savePayees();
  renderPayeeRows(p);
}

/* ===== 欄位變更 ===== */
function onField(payeeId, rowId, field, value){
  const p = payees.find(x=>x.id===payeeId);
  if(!p)return;
  const row = p.rows.find(r=>r.id===rowId);
  if(!row)return;
  if(field==='qty')row.qty = Math.max(0, parseInt(value)||0);
  else row[field] = value;
  savePayees();
  updateRowDerived(payeeId, row);
  updatePayeeSubtotal(p);
  updateGrandBar();
}

function updateRowDerived(payeeId, row){
  const tr = document.querySelector('tr[data-row-id="'+row.id+'"][data-payee-id="'+payeeId+'"]');
  if(!tr)return;
  const amt = lookupAmount(row.planKey, row.role, row.type);
  const invalid = !!(row.planKey && row.role && row.type && amt===null);
  const validity = planValidity(row.planKey);
  const sub = (amt!=null) ? amt*(row.qty||0) : 0;
  const unit = tr.querySelector('.unit-cell');
  if(amt!=null){
    unit.textContent = '$'+amt.toLocaleString();
    unit.classList.remove('warn');
    unit.removeAttribute('title');
  } else if(invalid){
    unit.textContent = '⚠ 無此組合';
    unit.classList.add('warn');
    unit.title = '此「身分＋類型」在此方案沒有分潤，請改選其他組合';
  } else {
    unit.textContent = '—';
    unit.classList.remove('warn');
    unit.removeAttribute('title');
  }
  tr.querySelector('.sub-cell').textContent = '$'+sub.toLocaleString();
  const planSelect = tr.querySelector('select[data-f="planKey"]');
  let planWarnEl = planSelect && planSelect.parentElement.querySelector('.plan-warning');
  if(validity){
    if(!planWarnEl){
      planWarnEl = document.createElement('div');
      planWarnEl.className = 'plan-warning';
      planSelect.insertAdjacentElement('afterend', planWarnEl);
    }
    planWarnEl.textContent = '⚠ '+(validity.status==='expired' ? '此方案已超過期限' : '此方案尚未開始')+'（'+validity.text+'）';
  } else if(planWarnEl){
    planWarnEl.remove();
  }
  tr.classList.toggle('row-warn', invalid || !!validity);
}
function calcPayeeSubtotal(p){
  let s = 0;
  p.rows.forEach(r=>{
    const a = lookupAmount(r.planKey, r.role, r.type);
    if(a!=null)s += a*(r.qty||0);
  });
  return s;
}
function updatePayeeSubtotal(p){
  const el = document.querySelector('.payee-card[data-payee-id="'+p.id+'"] .payee-card-subtotal .amt');
  if(el)el.textContent = '$'+calcPayeeSubtotal(p).toLocaleString();
}

function updateGrandBar(){
  let total=0, qty=0, count=0;
  payees.forEach(p=>{
    let hasValid = false;
    p.rows.forEach(r=>{
      const a = lookupAmount(r.planKey, r.role, r.type);
      if(a!=null && (r.qty||0)>0){total += a*r.qty; qty += r.qty; hasValid = true}
    });
    if(hasValid)count++;
  });
  document.getElementById('grandTotal').textContent = '$'+total.toLocaleString();
  document.getElementById('totalQty').textContent = qty;
  document.getElementById('payeeCount').textContent = count;
  const hasAny = payees.length>0;
  document.getElementById('bottomArea').style.display = hasAny ? 'block' : 'none';
  const canExport = count>0 && typeof XLSX !== 'undefined';
  document.getElementById('btnExportSingle').disabled = !canExport;
  document.getElementById('btnExportSplit').disabled = !canExport;
}

/* ===== 渲染 ===== */
function selectOptions(opts, current){
  return '<option value=""></option>' +
    opts.map(o=>'<option value="'+escapeHtml(o.value)+'"'+(o.value===current?' selected':'')+'>'+escapeHtml(o.label)+'</option>').join('');
}

function renderPayeeRows(p){
  const tbody = document.querySelector('tbody[data-rows-for="'+p.id+'"]');
  if(!tbody)return;
  const roleOpts = ROLES.map(r=>({value:r,label:r}));
  const planOpts = PLAN_OPTIONS.map(o=>({value:o.key,label:o.label}));
  const typeOpts = TYPES.map(t=>({value:t.v,label:t.l}));
  const disableDel = p.rows.length<=1;

  tbody.innerHTML = p.rows.map(r=>{
    const amt = lookupAmount(r.planKey, r.role, r.type);
    const invalid = !!(r.planKey && r.role && r.type && amt===null);
    const validity = planValidity(r.planKey);
    const sub = (amt!=null) ? amt*(r.qty||0) : 0;
    const unitHtml = amt!=null
      ? '$'+amt.toLocaleString()
      : invalid
        ? '⚠ 無此組合'
        : '—';
    const unitClass = 'unit-cell' + (invalid ? ' warn' : '');
    const unitTitle = invalid ? ' title="此「身分＋類型」在此方案沒有分潤，請改選其他組合"' : '';
    const planWarnHtml = validity
      ? '<div class="plan-warning">⚠ '+(validity.status==='expired' ? '此方案已超過期限' : '此方案尚未開始')+'（'+validity.text+'）</div>'
      : '';
    const rowWarn = invalid || !!validity;
    return '<tr data-row-id="'+r.id+'" data-payee-id="'+p.id+'"'+(rowWarn?' class="row-warn"':'')+'>'+
      '<td><select data-f="role">'+selectOptions(roleOpts, r.role)+'</select></td>'+
      '<td><select data-f="planKey">'+selectOptions(planOpts, r.planKey)+'</select>'+planWarnHtml+'</td>'+
      '<td><select data-f="type">'+selectOptions(typeOpts, r.type)+'</select></td>'+
      '<td><input type="number" min="0" inputmode="numeric" value="'+(r.qty||'')+'" placeholder="0" data-f="qty"></td>'+
      '<td class="'+unitClass+'"'+unitTitle+'>'+unitHtml+'</td>'+
      '<td class="sub-cell">$'+sub.toLocaleString()+'</td>'+
      '<td><button class="row-del" '+(disableDel?'disabled':'')+' title="刪除此列" data-act="del">✕</button></td>'+
    '</tr>';
  }).join('');

  tbody.querySelectorAll('tr').forEach(tr=>{
    const rowId = +tr.dataset.rowId;
    const payeeId = +tr.dataset.payeeId;
    tr.querySelectorAll('input,select').forEach(el=>{
      const evt = el.tagName==='SELECT' ? 'change' : 'input';
      el.addEventListener(evt, e=>onField(payeeId, rowId, e.target.dataset.f, e.target.value));
    });
    const delBtn = tr.querySelector('[data-act="del"]');
    if(delBtn)delBtn.addEventListener('click', ()=>delRow(payeeId, rowId));
  });

  updatePayeeSubtotal(p);
  updateGrandBar();
}

function renderPayees(){
  const area = document.getElementById('payeesArea');
  if(!payees.length){
    area.innerHTML = '<div class="empty-hint">'+
      '<div class="ic">👥</div>'+
      '<div class="t">尚未建立任何引薦人</div>'+
      '<div class="s">於上方輸入姓名後按 Enter，即可建立第一張卡片</div>'+
      '</div>';
    updateGrandBar();
    return;
  }
  area.innerHTML = payees.map(p=>{
    const sub = calcPayeeSubtotal(p);
    return '<div class="payee-card" data-payee-id="'+p.id+'">'+
      '<div class="payee-card-head">'+
        '<svg class="ic" viewBox="0 0 24 24" width="22" height="22" fill="#fff" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-4.4 0-8 2.2-8 5v3h16v-3c0-2.8-3.6-5-8-5z"/></svg>'+
        '<input type="text" class="payee-name-input" value="'+escapeHtml(p.name)+'" placeholder="引薦人姓名" data-payee-name="'+p.id+'">'+
        '<span class="payee-card-subtotal"><span class="lbl">小計</span><span class="amt">$'+sub.toLocaleString()+'</span></span>'+
        '<button class="payee-del" title="刪除整位引薦人" data-payee-del="'+p.id+'">🗑</button>'+
      '</div>'+
      '<div class="payee-card-body">'+
        '<div class="rows-wrap"><table class="rows">'+
          '<thead><tr>'+
            '<th class="col-role">引薦人身分</th>'+
            '<th class="col-plan">班別 · 方案</th>'+
            '<th class="col-type">分潤類型</th>'+
            '<th class="col-qty">筆數</th>'+
            '<th>單筆金額</th>'+
            '<th>小計</th>'+
            '<th></th>'+
          '</tr></thead>'+
          '<tbody data-rows-for="'+p.id+'"></tbody>'+
        '</table></div>'+
        '<button class="add-row-btn" data-add-row="'+p.id+'">＋ 新增此引薦人的分潤</button>'+
      '</div>'+
    '</div>';
  }).join('');

  payees.forEach(p=>{
    renderPayeeRows(p);
    const nameInp = document.querySelector('input[data-payee-name="'+p.id+'"]');
    if(nameInp){
      nameInp.addEventListener('input', e=>onPayeeNameInput(p.id, e.target.value));
      nameInp.addEventListener('blur', e=>onPayeeNameBlur(p.id, e.target.value));
    }
    const delBtn = document.querySelector('[data-payee-del="'+p.id+'"]');
    if(delBtn)delBtn.addEventListener('click', ()=>delPayee(p.id));
    const addBtn = document.querySelector('[data-add-row="'+p.id+'"]');
    if(addBtn)addBtn.addEventListener('click', ()=>addRow(p.id));
  });

  updateGrandBar();
}

/* ===== XLSX 匯出 ===== */
function sanitizeSheetName(name){
  const cleaned = (name||'未填').replace(/[\\\/\?\*\[\]:]/g, '_').trim() || '未填';
  return cleaned.slice(0,31);
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}
function exportXLSX(mode){
  if(typeof XLSX === 'undefined'){
    alert('XLSX 函式庫尚未載入，無法匯出。\n\n可能原因：\n1. 沒有將 xlsx.full.min.js 放至此 HTML 同資料夾\n2. 且目前無網路連線（CDN 載入失敗）\n\n解法：開啟網路重新整理頁面，或下載 xlsx.full.min.js（約 900KB）放至此資料夾。');
    return;
  }
  const wb = XLSX.utils.book_new();

  if(mode === 'single'){
    const rows = [];
    payees.forEach(p=>{
      p.rows.forEach(r=>{
        const a = lookupAmount(r.planKey, r.role, r.type);
        if(a!=null && (r.qty||0)>0){
          rows.push({
            '引薦人': p.name || '(未填)',
            '引薦人身分': r.role,
            '班別·方案': PLAN_MAP[r.planKey].label,
            '分潤類型': TYPE_LABEL[r.type],
            '筆數': r.qty,
            '單筆金額': a,
            '小計': a*r.qty,
          });
        }
      });
    });
    if(!rows.length){alert('沒有可匯出的有效分潤明細');return}
    const total = rows.reduce((s,r)=>s+r['小計'],0);
    const totalQty = rows.reduce((s,r)=>s+r['筆數'],0);
    rows.push({'引薦人':'合計','引薦人身分':'','班別·方案':'','分潤類型':'','筆數':totalQty,'單筆金額':'','小計':total});
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:14},{wch:12},{wch:30},{wch:10},{wch:8},{wch:12},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, '分潤明細');
  } else {
    const usedNames = new Set();
    let added = 0;
    payees.forEach(p=>{
      const rows = [];
      let total = 0, qty = 0;
      p.rows.forEach(r=>{
        const a = lookupAmount(r.planKey, r.role, r.type);
        if(a!=null && (r.qty||0)>0){
          const sub = a*r.qty;
          total += sub; qty += r.qty;
          rows.push({
            '引薦人身分': r.role,
            '班別·方案': PLAN_MAP[r.planKey].label,
            '分潤類型': TYPE_LABEL[r.type],
            '筆數': r.qty,
            '單筆金額': a,
            '小計': sub,
          });
        }
      });
      if(!rows.length)return;
      rows.push({'引薦人身分':'合計','班別·方案':'','分潤類型':'','筆數':qty,'單筆金額':'','小計':total});
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [{wch:12},{wch:30},{wch:10},{wch:8},{wch:12},{wch:14}];
      let baseName = sanitizeSheetName(p.name);
      let name = baseName, i = 2;
      while(usedNames.has(name)){
        const suffix = ' ('+i+')';
        name = baseName.slice(0, 31-suffix.length) + suffix;
        i++;
      }
      usedNames.add(name);
      XLSX.utils.book_append_sheet(wb, ws, name);
      added++;
    });
    if(!added){alert('沒有可匯出的有效分潤明細');return}
  }
  XLSX.writeFile(wb, '分潤計算_'+todayStr()+'.xlsx');
}

function scrollToPayee(payeeId){
  const card = document.querySelector('.payee-card[data-payee-id="'+payeeId+'"]');
  if(!card)return;
  card.scrollIntoView({behavior:'smooth', block:'center'});
  card.classList.remove('highlight');
  void card.offsetWidth;
  card.classList.add('highlight');
  setTimeout(()=>card.classList.remove('highlight'), 1500);
}
function setSuggOpen(open){
  newPayeeInput.parentElement.classList.toggle('open', open);
  payeeSuggestions.classList.toggle('show', open);
}

/* ===== 新增引薦人輸入 + 自訂建議下拉 ===== */
const newPayeeInput = document.getElementById('newPayeeInput');
const payeeSuggestions = document.getElementById('payeeSuggestions');
let suggIndex = -1;

function renderPayeeSuggestions(){
  const q = newPayeeInput.value.trim().toLowerCase();
  const existing = new Map(payees.map(p=>[p.name, p.id]));
  const all = getReferrers();
  payees.forEach(p=>{ if(p.name && !all.includes(p.name))all.unshift(p.name); });
  const list = all.filter(n=>!q || n.toLowerCase().includes(q));
  suggIndex = -1;
  if(!list.length){
    payeeSuggestions.innerHTML = '<div style="padding:14px;text-align:center;color:var(--muted);font-size:13px">尚無歷史名單</div>';
    return;
  }
  payeeSuggestions.innerHTML = list.map(n=>{
    const exists = existing.has(n);
    const tag = exists
      ? '<span class="existing-tag">已建立 · 點擊查看</span>'
      : '<span class="new-tag">新名字</span>';
    return '<div class="payee-suggestion-item" data-name="'+escapeHtml(n)+'" data-exists="'+(exists?'1':'0')+'">'+
      '<span class="sugg-name">'+escapeHtml(n)+'</span>'+
      '<span class="sugg-meta">'+tag+
        '<button type="button" class="sugg-del" data-del="'+escapeHtml(n)+'" title="從歷史名單移除此名字">✕</button>'+
      '</span>'+
    '</div>';
  }).join('');
}

function deleteFromHistory(name){
  const exists = payees.some(p=>p.name===name);
  const msg = exists
    ? '從歷史名單移除「'+name+'」？\n（已建立的引薦人卡片不會被刪除）'
    : '從歷史名單移除「'+name+'」？';
  if(!confirm(msg))return;
  const arr = getReferrers().filter(n=>n!==name);
  localStorage.setItem(LS_REF, JSON.stringify(arr));
  renderPayeeSuggestions();
  showToast('已從歷史名單移除「'+name+'」');
}

newPayeeInput.addEventListener('focus', ()=>{ renderPayeeSuggestions(); setSuggOpen(true); });
newPayeeInput.addEventListener('input', ()=>{ renderPayeeSuggestions(); setSuggOpen(true); });

document.getElementById('payeeToggle').addEventListener('mousedown', e=>{
  e.preventDefault();
  if(payeeSuggestions.classList.contains('show')){
    setSuggOpen(false);
    newPayeeInput.blur();
  } else {
    newPayeeInput.focus();
    renderPayeeSuggestions();
    setSuggOpen(true);
  }
});

document.addEventListener('mousedown', e=>{
  if(!e.target.closest('#payeeInputWrap')){
    setSuggOpen(false);
    if(document.activeElement === newPayeeInput)newPayeeInput.blur();
  }
});

payeeSuggestions.addEventListener('mousedown', e=>{
  const delBtn = e.target.closest('[data-del]');
  if(delBtn){
    e.preventDefault();
    e.stopPropagation();
    deleteFromHistory(delBtn.dataset.del);
    return;
  }
  const item = e.target.closest('.payee-suggestion-item');
  if(!item)return;
  e.preventDefault();
  const name = item.dataset.name;
  const exists = item.dataset.exists === '1';
  setSuggOpen(false);
  if(exists){
    const p = payees.find(p=>p.name===name);
    if(p){
      newPayeeInput.value = '';
      newPayeeInput.blur();
      scrollToPayee(p.id);
    }
  } else {
    newPayeeInput.value = name;
    newPayeeInput.focus();
  }
});

newPayeeInput.addEventListener('keydown', e=>{
  const items = payeeSuggestions.querySelectorAll('.payee-suggestion-item');
  if(e.key==='ArrowDown' && items.length){
    e.preventDefault();
    suggIndex = (suggIndex+1) % items.length;
    items.forEach((it,i)=>it.classList.toggle('active', i===suggIndex));
    items[suggIndex].scrollIntoView({block:'nearest'});
  } else if(e.key==='ArrowUp' && items.length){
    e.preventDefault();
    suggIndex = (suggIndex-1+items.length) % items.length;
    items.forEach((it,i)=>it.classList.toggle('active', i===suggIndex));
    items[suggIndex].scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(suggIndex>=0 && items[suggIndex]){
      const it = items[suggIndex];
      const name = it.dataset.name;
      const exists = it.dataset.exists === '1';
      setSuggOpen(false);
      if(exists){
        const p = payees.find(p=>p.name===name);
        if(p){newPayeeInput.value=''; scrollToPayee(p.id)}
      } else {
        newPayeeInput.value = name;
      }
    } else {
      addPayeeFromInput();
    }
  } else if(e.key==='Escape'){
    setSuggOpen(false);
    newPayeeInput.blur();
  }
});

/* ===== XLSX CDN fallback callback ===== */
window.onXLSXReady = function(){ updateGrandBar(); };

/* ===== 初始化 ===== */
renderPayees();
</script>
